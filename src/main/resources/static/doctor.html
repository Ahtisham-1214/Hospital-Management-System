<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor</title>
</head>
<body>
<form id="doctorForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br>
    <label for="specialization">Specialization:</label>
    <input type="text" id="specialization" name="specialization" required>
    <br>
<!--    <label for="age">Age:</label>-->
<!--    <input type="number" id="age" name="age">-->
<!--    <br>-->
<!--    <label>Gender</label>-->
<!--    <input type="radio" id="male" name="gender" value="Male">-->
<!--    <label for="male">Male</label>-->
<!--    <input type="radio" id="female" name="gender" value="Female">-->
<!--    <label for="female">Female</label>-->
<!--    <br>-->
<!--    <label>Date of Birth</label>-->
<!--    <input type="date" name="birth_date">-->

    <br>
    <input type="submit" value="Submit">
</form>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
<!--        <th>Age</th>-->
<!--        <th>Blood Group</th>-->
<!--        <th>Gender</th>-->
        <th>Email</th>
        <th>Specialization</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    </tr>
    </tbody>
</table>

<input type="button" value="View Doctors" onclick="viewDoctor()">


<script>
    document.getElementById('doctorForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop standard form submission

        // Construct the payload to match your Java Entity variables
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            specialization: document.getElementById('specialization').value,
            // gender: document.querySelector('input[name="gender"]:checked')?.value,
            // Match Java property names exactly:
            // birthDate: document.getElementsByName('birth_date')[0].value,
            // bloodGroup: document.getElementsByName('blood_group')[0].value
        };

        // Send data as application/json
        fetch('/doctors', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
            .then(response => {
                if(response.ok) alert('Doctor added successfully!');
            })
            .catch(error => console.error('Error:', error));
    });

    function viewDoctor() {
        fetch('/doctors', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json(); // Parses the JSON data from the backend
            })
            .then(doctors => {
                // Target the <tbody> element of your table
                const tableBody = document.querySelector('table tbody');

                // Clear any existing placeholder rows or old data
                tableBody.innerHTML = '';

                // Loop through the patient list and inject rows dynamically
                doctors.forEach(doctor => {
                    const row = document.createElement('tr');

                    row.innerHTML = `
                    <td style="font-weight: bold; color: #495057;">${doctor.id}</td>
                    <td>${doctor.name}</td>
<!--                     <td>${doctor.age}</td>-->
<!--                     <td>${doctor.bloodGroup}</td>-->
<!--                     <td>${doctor.gender}</td>-->
                    <td>${doctor.email}</td>
                    <td>${doctor.specialization}</td>

                `;

                    tableBody.appendChild(row);
                });
            })
            .catch(error => {
                console.error('Error fetching doctor data:', error);
            });
    }
</script>
</body>
</html>
