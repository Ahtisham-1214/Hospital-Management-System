<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
</head>
<body>
<h1>Welcome to Hospital Management System</h1>
</body>
<form id="patientForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br>
    <label for="age">Age:</label>
    <input type="number" id="age" name="age">
    <br>
    <label>Gender</label>
    <input type="radio" id="male" name="gender" value="Male">
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="Female">
    <label for="female">Female</label>
    <br>
    <label>Date of Birth</label>
    <input type="date" name="birth_date">
    <br>
    <label>Blood Group</label>
    <input type="text" name="blood_group" list="blood_group">
    <datalist id="blood_group">
        <option value="A_Positive"></option>
        <option value="B_Positive"></option>
        <option value="O_Positive"></option>
        <option value="AB_Positive"></option>
        <option value="A_Negative"></option>
        <option value="B_Negative"></option>
        <option value="O_Negative"></option>
        <option value="AB_Negative"></option>

    </datalist>
    <br>
    <input type="submit" value="Submit">
</form>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Blood Group</th>
        <th>Gender</th>
        <th>Email</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    </tr>
    </tbody>
</table>

<input type="button" value="View Patients" onclick="viewPatient()">


<script>
    document.getElementById('patientForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop standard form submission

        // Construct the payload to match your Java Entity variables
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            gender: document.querySelector('input[name="gender"]:checked')?.value,
            // Match Java property names exactly:
            birthDate: document.getElementsByName('birth_date')[0].value,
            bloodGroup: document.getElementsByName('blood_group')[0].value
        };

        // Send data as application/json
        fetch('/patient/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
            .then(response => {
                if(response.ok) alert('Patient added successfully!');
            })
            .catch(error => console.error('Error:', error));
    });

    function viewPatient() {
        fetch('/patient/view')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json(); // Parses the JSON data from the backend
            })
            .then(patients => {
                // Target the <tbody> element of your table
                const tableBody = document.querySelector('table tbody');

                // Clear any existing placeholder rows or old data
                tableBody.innerHTML = '';

                // Loop through the patient list and inject rows dynamically
                patients.forEach(patient => {
                    const row = document.createElement('tr');

                    row.innerHTML = `
                    <td style="font-weight: bold; color: #495057;">${patient.id}</td>
                    <td>${patient.name}</td>
                    <td>${patient.age}</td>
                    <td>${patient.bloodGroup}</td>
                    <td>${patient.gender}</td>
                    <td>${patient.email}</td>
                `;

                    tableBody.appendChild(row);
                });
            })
            .catch(error => {
                console.error('Error fetching patient data:', error);
            });
    }
</script>
</html>
